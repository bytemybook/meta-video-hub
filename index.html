<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Meta Video Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 18px;
    }

    h1 {
      font-size: 24px;
      margin: 10px 0 6px;
    }

    .subtext {
      font-size: 14px;
      color: #bdbdbd;
      margin-bottom: 16px;
    }

    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 16px;
      overflow: hidden;
      margin: 12px auto 16px;
      border: 1px solid #2b2b2b;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .empty-player {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8f8f8f;
      font-size: 18px;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      font-size: 18px;
      margin: 7px 0;
      cursor: pointer;
    }

    .primary {
      background: white;
      color: black;
      font-weight: bold;
    }

    .secondary {
      background: #252525;
      color: white;
    }

    .saved-title {
      margin-top: 20px;
      color: #d0d0d0;
      font-size: 15px;
    }

    .small {
      font-size: 13px;
      color: #9b9b9b;
      margin-top: 10px;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Meta Video Hub</h1>
    <div class="subtext">Choose a saved video or paste a YouTube link.</div>

    <div class="video-wrap" id="videoBox">
      <div class="empty-player">Pick a video to start.</div>
    </div>

    <button class="primary" onclick="playSaved('jfKfPfyJRdk')">
      Play Lo-Fi Study Music
    </button>

    <button class="secondary" onclick="playSaved('M7lc1UVf-VE')">
      Play YouTube Test Video
    </button>

    <div class="saved-title">Paste a YouTube link</div>

    <input
      id="youtubeUrl"
      type="text"
      placeholder="Paste YouTube link here"
    />

    <button class="primary" onclick="loadFromInput()">
      Load Video
    </button>

    <button class="secondary" onclick="clearVideo()">
      Clear
    </button>

    <div class="small" id="status">Ready.</div>
  </div>

  <script>
    function getYouTubeID(url) {
      try {
        const text = url.trim();

        if (text.length === 11 && !text.includes("http")) {
          return text;
        }

        const parsed = new URL(text);

        if (parsed.hostname.includes("youtu.be")) {
          return parsed.pathname.replace("/", "").split("?")[0];
        }

        if (parsed.hostname.includes("youtube.com")) {
          if (parsed.pathname.includes("/watch")) {
            return parsed.searchParams.get("v");
          }

          if (parsed.pathname.includes("/shorts/")) {
            return parsed.pathname.split("/shorts/")[1].split("/")[0];
          }

          if (parsed.pathname.includes("/embed/")) {
            return parsed.pathname.split("/embed/")[1].split("/")[0];
          }
        }

        return null;
      } catch (error) {
        return null;
      }
    }

    function playSaved(videoID) {
      showVideo(videoID);
    }

    function loadFromInput() {
      const input = document.getElementById("youtubeUrl");
      const status = document.getElementById("status");
      const videoID = getYouTubeID(input.value);

      if (!videoID) {
        status.textContent = "I could not read that YouTube link.";
        return;
      }

      showVideo(videoID);
    }

    function showVideo(videoID) {
      const videoBox = document.getElementById("videoBox");
      const status = document.getElementById("status");

      const embedUrl =
        "https://www.youtube.com/embed/" +
        videoID +
        "?autoplay=1&playsinline=1&rel=0&modestbranding=1";

      videoBox.innerHTML =
        '<iframe src="' +
        embedUrl +
        '" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>';

      status.textContent = "Playing video.";
    }

    function clearVideo() {
      const videoBox = document.getElementById("videoBox");
      const input = document.getElementById("youtubeUrl");
      const status = document.getElementById("status");

      input.value = "";
      videoBox.innerHTML = '<div class="empty-player">Pick a video to start.</div>';
      status.textContent = "Cleared.";
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter" || event.key === " ") {
        loadFromInput();
      }

      if (event.key === "Escape") {
        clearVideo();
      }
    });
  </script>
</body>
</html>
